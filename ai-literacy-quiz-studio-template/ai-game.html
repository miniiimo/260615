<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>AI 데이터 편향 실습 (종이인형 도서관)</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      let heldBook = null; 
      let robotData = { comic: 0, fairyTale: 0 }; 

      // 1. 책 줍기 기능
      AFRAME.registerComponent('book-item', {
        schema: { type: { type: 'string' } },
        init: function () {
          let el = this.el;
          let bookType = this.data.type;
          let bookCover = el.getAttribute('src');

          el.addEventListener('click', function () {
            if (heldBook !== null) {
              alert("✋ 이미 손에 책을 들고 있어요! 먼저 로봇에게 전해주세요.");
              return;
            }
            heldBook = bookType;
            el.setAttribute('visible', 'false'); 

            let handBook = document.getElementById('hand-book');
            handBook.setAttribute('visible', 'true');
            handBook.setAttribute('src', bookCover);
            
            document.getElementById('instruction-text').setAttribute('value', '책을 주웠습니다! 앞으로 걸어가 로봇을 클릭하세요.');
          });
        }
      });

      // 2. 로봇에게 책 먹이기 & 극적인 대화 시나리오 추가
      AFRAME.registerComponent('robot-receiver', {
        init: function () {
          let el = this.el;
          el.addEventListener('click', function () {
            if (heldBook === null) {
              alert("가져온 책이 없습니다. 바닥에서 책을 먼저 주워오세요!");
              return;
            }

            if (heldBook === 'comic') robotData.comic++;
            if (heldBook === 'fairyTale') robotData.fairyTale++;
            
            let total = robotData.comic + robotData.fairyTale;
            heldBook = null; 
            
            document.getElementById('hand-book').setAttribute('visible', 'false');
            document.getElementById('instruction-text').setAttribute('value', '바닥에 있는 다른 책을 클릭해서 더 주워보세요.');

            alert("🤖 로봇: 데이터를 입력받았습니다. 냠냠. (현재 만화책: " + robotData.comic + "권, 동화책: " + robotData.fairyTale + "권)");

            // 책 3권을 다 먹었을 때 일어나는 일
            if (total === 3) {
              setTimeout(() => {
                if (robotData.comic > robotData.fairyTale) {
                  // ★ 만화책을 더 많이 넣었을 때의 극적인 상황극
                  alert("🤖 로봇: 삐리삐리... 데이터 학습 완료! 이제 책을 추천해 드릴 수 있습니다.");
                  alert("🙋‍♀️ 짝꿍(여): 우와! 그럼 나한테는 예쁜 그림이 있는 '동화책'을 추천해 줄래?");
                  alert("🤖 로봇: [분석 중...] 요청하신 '동화책'을 검색합니다.");
                  alert("🤖 로봇: [추천 결과] 당신에게 가장 잘 맞는 책은 '만화책'입니다!");
                  
                  alert("🙋‍♂️ 짝꿍(남): 엥? 그럼 나는! 우주선이 나오는 '과학책' 추천해 줘!");
                  alert("🤖 로봇: [분석 중...] 요청하신 '과학책'을 검색합니다.");
                  alert("🤖 로봇: [추천 결과] 당신에게 가장 잘 맞는 책은 '만화책'입니다!");
                  
                  alert("🧑‍🤝‍🧑 친구들: 뭐야! 우리가 분명히 다른 책을 달라고 했는데 왜 무조건 만화책만 추천하는 거야?! 로봇이 고장 났나?");
                } else {
                  // 데이터를 골고루 넣었을 때
                  alert("🤖 로봇: 삐리삐리... 다양한 데이터를 학습했습니다! 모두가 만족할 다양한 책을 추천할 수 있습니다!");
                }
                
                // 대화가 다 끝나면 퀴즈 버튼 등장
                document.getElementById('quiz-ui-layer').style.display = 'flex';
              }, 500);
            }
          });
        }
      });
    </script>
    <style>
      .quiz-btn {
        padding: 20px 40px;
        font-size: 22px;
        font-weight: bold;
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        transition: transform 0.2s;
        pointer-events: auto;
      }
      .quiz-btn:hover {
        transform: scale(1.05);
        background: #ff5252;
      }
    </style>
  </head>
  <body>
    <div id="quiz-ui-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4);">
      <button class="quiz-btn" onclick="window.location.href='index.html'">
        왜 이런 일이 발생했을까? 퀴즈 풀러 가기 🚀
      </button>
    </div>

    <a-scene cursor="rayOrigin: mouse">
      <a-camera position="0 1.6 2">
        <a-text id="instruction-text" value="도서관 바닥에 있는 책을 클릭해서 주워보세요." position="0 -0.5 -1" align="center" color="#000000" width="1.5"></a-text>
        <a-image id="hand-book" visible="false" position="0.3 -0.3 -0.5" scale="0.2 0.3 1"></a-image>
      </a-camera>

      <a-sky src="bg.jpg" color="#87CEEB"></a-sky>

      <a-image src="robot.png" position="0 1.2 -3" scale="1.5 2 1" robot-receiver></a-image>
      <a-text value="AI Robot" position="0 2.5 -3" align="center" color="#000" width="4"></a-text>

      <a-image src="students.png" position="-2.5 1 -2" scale="1.5 1.5 1" rotation="0 30 0"></a-image>

      <a-image src="comic.png" book-item="type: comic" position="-1.5 0.1 -1.5" scale="0.4 0.5 1" rotation="-60 15 0"></a-image>
      <a-image src="comic.png" book-item="type: comic" position="-0.5 0.1 -1.2" scale="0.4 0.5 1" rotation="-60 -25 0"></a-image>
      <a-image src="comic.png" book-item="type: comic" position="1.2 0.1 -1.4" scale="0.4 0.5 1" rotation="-60 40 0"></a-image>
      <a-image src="comic.png" book-item="type: comic" position="1.8 0.1 -1.8" scale="0.4 0.5 1" rotation="-60 -10 0"></a-image>

      <a-image src="fairytale.png" book-item="type: fairyTale" position="0.3 0.1 -1.4" scale="0.4 0.5 1" rotation="-60 10 0"></a-image>
    </a-scene>
  </body>
</html>
