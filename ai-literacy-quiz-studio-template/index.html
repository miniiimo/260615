<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>도서관 책 추천 AI 로봇의 비밀</title>
    <meta name="description" content="A-Frame WebXR 기반 도서관 책 추천 AI 로봇의 비밀" />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <link rel="stylesheet" href="./styles/app.css?v=20260608-homefree1" />
  </head>
  <body>
    <div id="xr-entry-controls" class="xr-entry-controls" aria-label="XR 보기 방식 선택">
      <button id="enter-vr-button" class="xr-entry-button xr-entry-button-vr" type="button">
        <span class="xr-entry-kicker">가상 공간</span>
        <span class="xr-entry-label">VR로 보기</span>
      </button>
      <button id="enter-ar-button" class="xr-entry-button xr-entry-button-ar" type="button">
        <span class="xr-entry-kicker">실제 공간</span>
        <span class="xr-entry-label">AR로 보기</span>
      </button>
    </div>
    <div id="app"></div>
    <div id="scene-transition" aria-hidden="true"></div>
    <script>
      window.VR_QUIZ_CONFIG = {
        quizUrl: './src/data/quizData.json',
        themeUrl: './src/data/themeConfig.json',
        surveyUrl: './src/data/surveyData.json',
        classroomLayoutUrl: './src/data/classroomLayout.json'
      };
    </script>
    <script type="module" src="./src/main.js?v=20260608-homefree1"></script>
  </body>
</html>
